services:
  # ===========================================
  # Traefik - Reverse Proxy
  # ===========================================
  traefik:
    image: traefik:v2.10
    container_name: lsl_traefik
    command:
      - "--api.insecure=true"  # Enable dashboard (dev only)
      - "--providers.docker=true"  # Enable Docker provider
      - "--providers.docker.exposedbydefault=false"  # Disable auto-expose
      - "--entrypoints.web.address=:80"  # HTTP entrypoint
    ports:
      - "8888:80"      # HTTP (changed from 80 to avoid conflict with Apache)
      - "8080:8080"  # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lsl_network

  # ===========================================
  # RabbitMQ - Message Broker
  # ===========================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: lsl_rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - lsl_network
    user: "999:999"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Auth Service - Authentication & Users
  # ===========================================
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: lsl_auth
    volumes:
      - ./auth_service:/app
      - ./frontend:/frontend
      - shared_db:/shared_db
    environment:
      - DJANGO_SETTINGS_MODULE=auth_service.settings
      - ALLOWED_HOSTS=*
      - SHARED_DB_PATH=/shared_db/db.sqlite3
    networks:
      - lsl_network
    depends_on:
      - rabbitmq
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`) || PathPrefix(`/static/`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.service=auth"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"

  # ===========================================
  # API Service - Main API & Frontend
  # ===========================================
  api_service:
    build:
      context: ./api_service
      dockerfile: Dockerfile
    container_name: lsl_api
    volumes:
      - ./api_service:/app
      - ./frontend:/frontend
      - shared_db:/shared_db
    environment:
      - DJANGO_SETTINGS_MODULE=api_service.settings
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - ALLOWED_HOSTS=*
      - SHARED_DB_PATH=/shared_db/db.sqlite3
    networks:
      - lsl_network
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth_service:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/ui`) || PathPrefix(`/static/`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.service=api"
      - "traefik.http.services.api.loadbalancer.server.port=8001"

  # ===========================================
  # AI Service - ML Model & Prediction
  # ===========================================
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: lsl_ai
    volumes:
      - ./ai_service:/app
      - ai_db_data:/app/data
    environment:
      - DJANGO_SETTINGS_MODULE=ai_service.settings
      - DATABASE_URL=sqlite:///data/db.sqlite3
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - ALLOWED_HOSTS=*
    networks:
      - lsl_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=PathPrefix(`/ai`)"
      - "traefik.http.routers.ai.entrypoints=web"
      - "traefik.http.routers.ai.service=ai"
      - "traefik.http.services.ai.loadbalancer.server.port=8002"

  # ===========================================
  # AI Worker - Consumes RabbitMQ Queue
  # ===========================================
  ai_worker:
    build:
      context: ./ai_service
      dockerfile: Dockerfile.worker
    container_name: lsl_ai_worker
    volumes:
      - ./ai_service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
    networks:
      - lsl_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: python ai_worker.py
    restart: unless-stopped

networks:
  lsl_network:
    driver: bridge

volumes:
  rabbitmq_data:
  shared_db:
  ai_db_data:
